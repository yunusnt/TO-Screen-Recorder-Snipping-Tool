<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>TO Screen Recorder Editor</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            margin: 0; padding: 0; background: #1a1a2e; 
            display: flex; flex-direction: column; 
            height: 100vh; overflow: hidden; font-family: 'Segoe UI', Tahoma, sans-serif; color: white; 
        }
        #toolbar { 
            width: 100%; min-height: 70px; background: #16213e; 
            display: flex; align-items: center; justify-content: center; gap: 10px; flex-wrap: wrap;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5); z-index: 10; 
            border-bottom: 2px solid #0f3460; padding: 8px 16px;
        }
        #canvas-container { 
            flex: 1; overflow: auto; width: 100%; position: relative; padding: 20px; 
            background: #111; display: grid; place-items: center;
        }
        canvas { 
            background: transparent; cursor: crosshair; box-shadow: 0 0 30px rgba(0,0,0,0.9);
        }

        /* --- GENEL BUTON --- */
        .btn { 
            background: #2a2a4a; border: 1.5px solid #3a3a6a; padding: 7px 14px; 
            border-radius: 7px; cursor: pointer; color: white; font-weight: 600; 
            transition: all 0.18s; display: flex; align-items: center; gap: 6px;
            font-size: 12px; white-space: nowrap;
        }
        .btn:hover { background: #3a3a6a; border-color: #5a5aaa; }
        .btn.active { 
            background: #00d2ff; color: #000; border-color: #00d2ff; 
            box-shadow: 0 0 12px rgba(0,210,255,0.5); 
        }
        .save-btn { background: #1a7a32; color: white; border-color: #28c940; font-size: 13px; }
        .save-btn:hover { background: #28a745; box-shadow: 0 0 15px rgba(40,199,64,0.5); }
        .undo-btn { background: #3a2a1a; border-color: #ff8c00; }
        .undo-btn:hover { background: #5a3a1a; }

        /* --- ARAÇ GRUPLARI --- */
        .tool-group { 
            display: flex; align-items: center; gap: 6px; 
            background: #1e1e3e; padding: 5px 10px; border-radius: 8px;
            border: 1px solid #2a2a5a;
        }
        .tool-group label { font-size: 10px; color: #8888aa; text-transform: uppercase; letter-spacing: 0.5px; }
        .separator { width: 1px; height: 40px; background: #2a2a5a; margin: 0 4px; }

        input[type="color"] { 
            cursor: pointer; border: 2px solid #444; width: 32px; height: 32px; 
            background: none; border-radius: 5px; padding: 1px;
        }
        input[type="range"] { width: 80px; accent-color: #00d2ff; }

        /* --- MARKER BUTONLARI --- */
        .marker-btn {
            width: 32px; height: 32px; border-radius: 6px; border: 2px solid rgba(255,255,255,0.2);
            cursor: pointer; transition: all 0.18s; position: relative; display: flex;
            align-items: center; justify-content: center; flex-shrink: 0;
        }
        .marker-btn:hover { transform: scale(1.15); border-color: white; }
        .marker-btn.active { 
            border: 2.5px solid white; 
            box-shadow: 0 0 10px rgba(255,255,255,0.6);
            transform: scale(1.15);
        }
        .marker-btn::after {
            content: '';
            position: absolute;
            bottom: 3px; left: 50%; transform: translateX(-50%);
            width: 60%; height: 5px; border-radius: 3px;
            background: rgba(0,0,0,0.35);
        }

        /* --- FLOATING METİN GİRİŞİ --- */
        .floating-input { 
            position: absolute; background: rgba(0,0,0,0.6); border: 2px dashed #00d2ff; 
            color: white; font-size: 24px; font-weight: bold; outline: none; z-index: 20; 
            padding: 5px 10px; border-radius: 5px; text-shadow: 1px 1px 2px black;
            min-width: 120px;
        }

        /* --- ARAÇ TOOLTIP --- */
        .btn[title]:hover::after, .marker-btn[title]:hover::after {
            content: attr(title);
            position: absolute; bottom: -28px; left: 50%; transform: translateX(-50%);
            background: #333; color: white; padding: 3px 8px; border-radius: 4px;
            font-size: 10px; white-space: nowrap; z-index: 100; pointer-events: none;
        }
        .btn[title], .marker-btn[title] { position: relative; }
    </style>
</head>
<body>
    <div id="toolbar">

        <!-- KALEM ARAÇLARI -->
        <div class="tool-group">
            <label>Araç</label>
        </div>
        
        <!-- NORMAL ARAÇLAR -->
        <div class="tool-group">
            <button class="tool-btn active" id="btnDraw" data-i18n="editor_btn_draw">
                Kalem
            </button>
            <button class="tool-btn" id="btnText" data-i18n="editor_btn_text">
                Yazı
            </button>
            <button class="tool-btn" id="btnEraser" data-i18n="editor_btn_eraser">
                Silgi
            </button>
        </div>

        <div class="separator"></div>

        <!-- MARKER / VURGULAYICI -->
        <div class="tool-group">
            <label>Marker</label>
            <!-- Sarı -->
            <div class="marker-btn" id="marker-yellow" title="Sarı Marker" 
                 style="background: rgba(255,230,0,0.7);" data-color="#FFE600"></div>
            <!-- Yeşil -->
            <div class="marker-btn" id="marker-green" title="Yeşil Marker" 
                 style="background: rgba(0,255,120,0.7);" data-color="#00FF78"></div>
            <!-- Turuncu -->
            <div class="marker-btn" id="marker-orange" title="Turuncu Marker" 
                 style="background: rgba(255,140,0,0.75);" data-color="#FF8C00"></div>
            <!-- Pembe/Kırmızı -->
            <div class="marker-btn" id="marker-pink" title="Pembe Marker" 
                 style="background: rgba(255,80,180,0.7);" data-color="#FF50B4"></div>
            <!-- Mavi -->
            <div class="marker-btn" id="marker-blue" title="Mavi Marker" 
                 style="background: rgba(0,180,255,0.7);" data-color="#00B4FF"></div>
            <!-- Mor -->
            <div class="marker-btn" id="marker-purple" title="Mor Marker" 
                 style="background: rgba(160,80,255,0.7);" data-color="#A050FF"></div>
        </div>

        <div class="separator"></div>

        <!-- RENK & BOYUT -->
        <div class="tool-group">
            <label data-i18n="editor_color">Renk</label>
            <input type="color" id="colorPicker" value="#ff0000" title="Özel Renk">
        </div>
        <div class="tool-group">
            <label data-i18n="editor_size">Boyut</label>
            <input type="range" id="brushSize" min="1" max="40" value="5">
            <span id="brushSizeLabel" style="font-size:11px;color:#aaa;min-width:20px;">5</span>
        </div>
        <div class="tool-group">
            <label data-i18n="editor_marker_size">Marker Kalınlığı</label>
            <input type="range" id="markerSize" min="10" max="80" value="30">
            <span id="markerSizeLabel" style="font-size:11px;color:#aaa;min-width:20px;">30</span>
        </div>

        <div class="separator"></div>

        <!-- ZOOM KONTROLLERİ -->
        <div class="tool-group">
            <label>Zoom</label>
            <button class="btn" id="btnZoomOut" title="Zoom Out">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
            <span id="zoomLevelLabel" style="font-size:11px;color:#aaa;min-width:35px;text-align:center;">100%</span>
            <button class="btn" id="btnZoomIn" title="Zoom In">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
        </div>

        <div class="separator"></div>

        <!-- GERİ AL & KAYDET -->
        <button class="btn undo-btn" id="btnUndo" title="Geri Al (Ctrl+Z)">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 14 4 9 9 4"/><path d="M20 20v-7a4 4 0 0 0-4-4H4"/></svg>
            Geri Al
        </button>
        <button class="btn save-btn" id="btnSave">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
            KAYDET
        </button>
    </div>
    
    <div id="canvas-container">
        <canvas id="canvas"></canvas>
    </div>
    <script>
        const fs = require('fs');
        const path = require('path');
        const langPath = fs.existsSync(path.join(process.cwd(), 'lang.json')) ? path.join(process.cwd(), 'lang.json') : path.join(__dirname, 'lang.json');
        try {
            const lang = JSON.parse(fs.readFileSync(langPath, 'utf8'));
            document.querySelectorAll('[data-i18n]').forEach(el => {
                if (lang[el.getAttribute('data-i18n')]) {
                    if(el.tagName === 'LABEL') el.innerText = lang[el.getAttribute('data-i18n')];
                    else if(el.tagName === 'SPAN') el.innerText = lang[el.getAttribute('data-i18n')];
                    else el.innerHTML = lang[el.getAttribute('data-i18n')] + (el.querySelector('.shortcut') ? `<span class="shortcut">${el.querySelector('.shortcut').innerText}</span>` : '');
                }
            });
            document.title = lang.editor_window_title || document.title;
            window.appLang = lang;
        } catch(e) { window.appLang = {}; }
    </script>
    <script src="editor.js"></script>
</body>
</html>
