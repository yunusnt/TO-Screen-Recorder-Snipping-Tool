<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>TO Screen Recorder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dock" id="dock">

        <!-- Pencere Kontrolleri -->
        <div class="window-controls">
            <button class="win-btn info"     id="winInfo">?</button>
            <button class="win-btn minimize" id="winMinimize">−</button>
            <button class="win-btn close"    id="winClose">✕</button>
        </div>

        <!-- Timer -->
        <div class="timer" id="timer">00:00</div>

        <!-- Fotoğraf -->
        <button class="icon-btn btn-snap" id="snapBtn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
                <circle cx="12" cy="13" r="4"/>
            </svg>
            <span style="font-size:9px;margin-top:2px;">FOTO</span>
        </button>
        <!-- Kayıt Kontrolleri -->
        <div id="controlsContainer" style="width:100%;">

            <!-- Kayıt Başlat -->
            <button class="icon-btn btn-rec" id="mainRecBtn" data-i18n-title="tooltip_record">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#ff4b2b" stroke-width="2">
                    <circle cx="12" cy="12" r="8" fill="#ff4b2b"/>
                </svg>
                <span style="font-size:9px;margin-top:2px;" data-i18n="tooltip_record">KAYDET</span>
            </button>

            <!-- Kayıt Devam Ediyor: Duraklat + Durdur -->
            <div class="recording-controls hidden" id="recordingControls">
                <button class="icon-btn btn-pause" id="pauseBtn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="#f7971e" stroke="none">
                        <rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>
                    </svg>
                    <span style="font-size:9px;margin-top:2px;" data-i18n="text_pause">DURAKLAT</span>
                </button>
                <button class="icon-btn btn-rec blinking-rec" id="activeRecBtn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="#ff4b2b" stroke="none" id="activeRecIcon">
                        <rect x="4" y="4" width="16" height="16" rx="2"/>
                    </svg>
                    <span style="font-size:9px;margin-top:2px;" data-i18n="text_stop">DURDUR</span>
                </button>
            </div>

        </div>

        <!-- Ses Toggle -->
        <div class="audio-toggle enabled" id="audioToggle">🔊 SES: AÇIK</div>

        <!-- Kalite Seçici -->
        <div class="quality-selector">
            <div class="qual-btn"        id="btnSD">SD</div>
            <div class="qual-btn active" id="btnHD">HD</div>
            <div class="qual-btn"        id="btn4K">4K</div>
        </div>
    </div>

    <script src="renderer.js"></script>
    <script>
        const fs = require('fs');
        const path = require('path');
        const langPath = fs.existsSync(path.join(process.cwd(), 'lang.json')) 
            ? path.join(process.cwd(), 'lang.json') 
            : path.join(__dirname, 'lang.json');
        try {
            const lang = JSON.parse(fs.readFileSync(langPath, 'utf8'));
            document.querySelectorAll('[data-i18n]').forEach(el => {
                if (lang[el.getAttribute('data-i18n')]) el.innerText = lang[el.getAttribute('data-i18n')];
            });
            document.querySelectorAll('[data-i18n-title]').forEach(el => {
                if (lang[el.getAttribute('data-i18n-title')]) el.title = lang[el.getAttribute('data-i18n-title')];
            });
            document.title = lang.app_title || document.title;
        } catch(e) {}
    </script>
</body>
</html>
